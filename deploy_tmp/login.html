<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up — Modiva</title>
  <meta name="description" content="Sign in or create your Modiva account to start shopping.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/modiva.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="auth-card">

          <!-- Logo -->
          <a href="index.html" class="text-decoration-none">
            <div class="brand-title">Modiva</div>
          </a>
          <p class="text-center text-muted mb-4" style="font-size:.9rem;">Your premium fashion destination</p>

          <!-- Tab Switch -->
          <div class="tab-switch mb-4">
            <button id="tab-login" class="active" onclick="showTab('login')">Sign In</button>
            <button id="tab-signup" onclick="showTab('signup')">Create Account</button>
          </div>

          <!-- Error/Success messages -->
          <div id="auth-msg" style="display:none;" class="mb-3"></div>

          <!-- LOGIN FORM -->
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-floating mb-3">
              <input type="email" class="form-control rounded-3" id="login-email" placeholder="Email" required>
              <label for="login-email"><i class="fa-regular fa-envelope me-1"></i> Email address</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control rounded-3" id="login-password" placeholder="Password" required>
              <label for="login-password"><i class="fa-solid fa-lock me-1"></i> Password</label>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me">
                <label class="form-check-label text-muted" for="remember-me" style="font-size:.85rem;">Remember me</label>
              </div>
              <a href="#" class="text-brand" style="font-size:.85rem;">Forgot password?</a>
            </div>
            <button type="submit" class="btn-auth" id="login-btn">
              <span id="login-spinner" class="spinner-border spinner-border-sm me-2" style="display:none;"></span>
              Sign In
            </button>
          </form>

          <!-- SIGNUP FORM -->
          <form id="signup-form" style="display:none;" onsubmit="handleSignup(event)">
            <div class="form-floating mb-3">
              <input type="text" class="form-control rounded-3" id="signup-name" placeholder="Full Name" required>
              <label for="signup-name"><i class="fa-regular fa-user me-1"></i> Full Name</label>
            </div>
            <div class="form-floating mb-3">
              <input type="email" class="form-control rounded-3" id="signup-email" placeholder="Email" required>
              <label for="signup-email"><i class="fa-regular fa-envelope me-1"></i> Email address</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control rounded-3" id="signup-password" placeholder="Password" required minlength="6">
              <label for="signup-password"><i class="fa-solid fa-lock me-1"></i> Password (min 6 chars)</label>
            </div>
            <div class="form-floating mb-4">
              <input type="password" class="form-control rounded-3" id="signup-confirm" placeholder="Confirm Password" required>
              <label for="signup-confirm"><i class="fa-solid fa-lock me-1"></i> Confirm Password</label>
            </div>
            <button type="submit" class="btn-auth" id="signup-btn">
              <span id="signup-spinner" class="spinner-border spinner-border-sm me-2" style="display:none;"></span>
              Create Account
            </button>
          </form>

          <!-- Divider -->
          <div class="text-center mt-4">
            <p class="text-muted" style="font-size:.82rem;">
              By continuing, you agree to Modiva's
              <a href="#" class="text-brand">Terms</a> &amp;
              <a href="#" class="text-brand">Privacy Policy</a>
            </p>
          </div>


        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { signIn, signUp, watchAuthState } from './js/auth.js';

// Redirect if already logged in
watchAuthState((user) => {
  if (user) window.location.href = 'index.html';
});

window.showTab = function(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
  document.getElementById('signup-form').style.display = isLogin ? 'none' : 'block';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-signup').classList.toggle('active', !isLogin);
  clearMsg();
};

function showMsg(msg, type = 'danger') {
  const el = document.getElementById('auth-msg');
  el.style.display = 'block';
  el.innerHTML = `<div class="alert alert-${type} rounded-3 py-2 px-3 mb-0" style="font-size:.88rem;">${msg}</div>`;
}

function clearMsg() {
  const el = document.getElementById('auth-msg');
  el.style.display = 'none';
  el.innerHTML = '';
}

window.handleLogin = async function(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const spinner = document.getElementById('login-spinner');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  clearMsg();

  try {
    await signIn(email, password);
    showMsg('✓ Signed in! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } catch (err) {
    showMsg(getFriendlyError(err.code));
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
};

window.handleSignup = async function(e) {
  e.preventDefault();
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm  = document.getElementById('signup-confirm').value;
  const btn      = document.getElementById('signup-btn');
  const spinner  = document.getElementById('signup-spinner');

  if (password !== confirm) { showMsg('Passwords do not match.'); return; }

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  clearMsg();

  try {
    await signUp(name, email, password);
    showMsg('✓ Account created! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  } catch (err) {
    showMsg(getFriendlyError(err.code));
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
};

function getFriendlyError(code) {
  const msgs = {
    'auth/user-not-found': 'No account found with this email.',
    'auth/wrong-password': 'Incorrect password. Please try again.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/too-many-requests': 'Too many attempts. Please try again later.',
  };
  return msgs[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
