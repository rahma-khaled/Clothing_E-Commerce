<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop â€” Modiva</title>
  <meta name="description" content="Browse Modiva's full collection of premium women's fashion.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/modiva.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg modiva-nav">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="images/modiva-logo-new.png" alt="Modiva Logo">Modiva
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <a id="auth-nav-link" href="login.html" class="nav-link d-flex align-items-center gap-1">
          <i class="fa-regular fa-user"></i>
          <span id="auth-nav-text">Sign In</span>
        </a>
        <button class="nav-link cart-btn" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
          <i class="fa-solid fa-bag-shopping me-1"></i> Cart
          <span id="cart-badge"></span>
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div style="background:var(--light-bg); padding:2.5rem 0; border-bottom:1px solid #e5e7eb;">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div>
      <h1 class="section-title mb-1">All Products</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="index.html" class="text-brand">Home</a></li>
          <li class="breadcrumb-item active">Shop</li>
        </ol>
      </nav>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span id="product-count" class="text-muted" style="font-size:.9rem;"></span>
      <select class="form-select form-select-sm rounded-pill" id="sort-select" style="width:auto;">
        <option value="newest">Newest First</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name">Name Aâ€“Z</option>
      </select>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container py-5">
  <div class="row g-4">

    <!-- SIDEBAR -->
    <div class="col-lg-3">
      <div style="background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.8rem; position:sticky; top:90px;">
        <h6 class="fw-700 mb-3" style="text-transform:uppercase; letter-spacing:.5px; font-size:.8rem; color:var(--muted);">Category</h6>
        <div class="category-pills flex-column" id="sidebar-filter">
          <button class="pill active mb-1" data-cat="all">All Products</button>
          <button class="pill mb-1" data-cat="sweaters">Sweaters</button>
          <button class="pill mb-1" data-cat="tops">Tops &amp; T-Shirts</button>
          <button class="pill mb-1" data-cat="dresses">Dresses</button>
          <button class="pill mb-1" data-cat="outerwear">Outerwear</button>
          <button class="pill mb-1" data-cat="accessories">Accessories</button>
        </div>

        <hr class="my-3">

        <h6 class="fw-700 mb-3" style="text-transform:uppercase; letter-spacing:.5px; font-size:.8rem; color:var(--muted);">Price Range</h6>
        <div class="d-flex align-items-center gap-2">
          <input type="number" class="form-control form-control-sm rounded" id="min-price" placeholder="Min" min="0" value="0">
          <span class="text-muted">â€“</span>
          <input type="number" class="form-control form-control-sm rounded" id="max-price" placeholder="Max" min="0" value="9999">
        </div>
        <button class="btn btn-success btn-sm w-100 rounded-pill mt-3" onclick="applyFilter()">Apply Filter</button>
        <button class="btn btn-light btn-sm w-100 rounded-pill mt-2" onclick="resetFilter()">Reset</button>
      </div>
    </div>

    <!-- PRODUCT GRID -->
    <div class="col-lg-9">
      <div id="shop-loading" class="products-loading">
        <div class="spinner-brand"></div>Loading productsâ€¦
      </div>
      <div class="row g-3" id="shop-products-grid"></div>
    </div>
  </div>
</div>

<!-- CART OFFCANVAS -->
<div class="offcanvas offcanvas-end offcanvas-cart" tabindex="-1" id="cartOffcanvas" style="width:380px;">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title"><i class="fa-solid fa-bag-shopping me-2"></i>Your Cart</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body" id="offcanvas-cart-body"></div>
  <div class="p-3 border-top" id="offcanvas-cart-footer" style="display:none;">
    <div class="d-flex justify-content-between fw-700 mb-3">
      <span>Total</span>
      <span class="text-brand" id="offcanvas-total">$0.00</span>
    </div>
    <a href="cart.html" class="btn btn-success w-100 rounded-pill">Proceed to Checkout</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { listenToProducts } from './js/products.js';
import { addToCart, getCart, updateCartBadge, getCartTotal } from './js/cart.js';
import { watchAuthState, logOut } from './js/auth.js';

watchAuthState((user) => {
  const el = document.getElementById('auth-nav-text');
  const link = document.getElementById('auth-nav-link');
  if (user && el) {
    el.textContent = user.email.split('@')[0];
    link.href = '#';
    link.onclick = async () => { await logOut(); location.reload(); };
  }
});

let allProducts = [];
let currentCat = 'all';
let minPrice = 0, maxPrice = 9999;

window.addProductToCart = function(id, name, price, imageUrl, category) {
  addToCart({ id, name, price: +price, imageUrl, category });
  updateCartBadge();
  renderCartOffcanvas();
};

function createCard(p) {
  const stars = Array.from({length:5}, (_,i) =>
    `<i class="fa-${i < Math.round(p.rating||5) ? 'solid':'regular'} fa-star"></i>`).join('');
  return `
    <div class="col-6 col-md-4">
      <div class="product-card">
        <div class="product-img-wrap">
          <img src="${p.imageUrl || 'images/new1.jpg'}" alt="${p.name}" loading="lazy">
          ${p.isNew ? '<span class="product-badge">New</span>' : ''}
        </div>
        <div class="card-body">
          <p class="brand">${p.brand || p.category || 'Modiva'}</p>
          <h6 class="product-name">${p.name}</h6>
          <div class="stars">${stars}</div>
          <div class="product-footer">
            <span class="product-price">$${(+p.price).toFixed(2)}</span>
            <button class="btn-add-cart" onclick="window.addProductToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.imageUrl||''}','${p.category||''}')">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderShop() {
  const grid = document.getElementById('shop-products-grid');
  const countEl = document.getElementById('product-count');
  const sort = document.getElementById('sort-select').value;

  let filtered = allProducts.filter(p => {
    const catMatch = currentCat === 'all' || (p.category||'').toLowerCase() === currentCat;
    const priceMatch = p.price >= minPrice && p.price <= maxPrice;
    return catMatch && priceMatch;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));

  if (countEl) countEl.textContent = `${filtered.length} products`;

  if (!grid) return;
  grid.innerHTML = filtered.length
    ? filtered.map(createCard).join('')
    : `<div class="empty-state col-12"><div class="empty-icon"><i class="fa-solid fa-shirt"></i></div><p>No products found</p><button class="btn btn-outline-success rounded-pill px-4" onclick="resetFilter()">Clear Filters</button></div>`;
}

function renderCartOffcanvas() {
  const cart = getCart();
  const body = document.getElementById('offcanvas-cart-body');
  const footer = document.getElementById('offcanvas-cart-footer');
  const totalEl = document.getElementById('offcanvas-total');
  if (!cart.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-bag-shopping"></i></div><p>Your cart is empty</p></div>`;
    if (footer) footer.style.display = 'none';
    return;
  }
  body.innerHTML = cart.map(item => `
    <div class="cart-item-card">
      <img src="${item.imageUrl || 'images/new1.jpg'}" alt="${item.name}">
      <div style="flex:1"><div style="font-weight:600;font-size:.9rem;">${item.name}</div><div style="font-weight:700;color:var(--brand);margin-top:.3rem;">$${(item.price*item.qty).toFixed(2)}</div></div>
      <span style="font-size:.8rem;background:#f0f0f0;padding:.2rem .7rem;border-radius:50px;">أ—${item.qty}</span>
    </div>`).join('');
  if (totalEl) totalEl.textContent = `$${getCartTotal().toFixed(2)}`;
  if (footer) footer.style.display = 'block';
}

document.getElementById('cartOffcanvas')?.addEventListener('show.bs.offcanvas', renderCartOffcanvas);
document.getElementById('sort-select')?.addEventListener('change', renderShop);

document.querySelectorAll('#sidebar-filter .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sidebar-filter .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderShop();
  });
});

window.applyFilter = function() {
  minPrice = +(document.getElementById('min-price').value) || 0;
  maxPrice = +(document.getElementById('max-price').value) || 9999;
  renderShop();
};

window.resetFilter = function() {
  currentCat = 'all';
  minPrice = 0; maxPrice = 9999;
  document.getElementById('min-price').value = 0;
  document.getElementById('max-price').value = 9999;
  document.querySelectorAll('#sidebar-filter .pill').forEach(b => b.classList.remove('active'));
  document.querySelector('#sidebar-filter .pill').classList.add('active');
  renderShop();
};

listenToProducts((products) => {
  allProducts = products;
  document.getElementById('shop-loading').style.display = 'none';
  renderShop();
  updateCartBadge();
});

updateCartBadge();
</script>
</body>
</html>
